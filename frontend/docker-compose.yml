services:
  frontend:
    build:
      context: .
    env_file:
      - ./.env
    command: npm run dev -- --host 0.0.0.0 --port 5173
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "${FRONTEND_PORT}:5173"
    volumes:
      - ./:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
