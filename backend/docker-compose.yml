services:
  db:
    image: postgres:16-alpine
    env_file:
      - ./.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-wellness_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./.env
    environment:
      PORT: ${PORT:-8000}
      DATABASE_HOST: ${DATABASE_HOST:-db}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      AUTO_START_SETUP: ${AUTO_START_SETUP:-false}
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
