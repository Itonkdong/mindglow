services:
  db:
    image: postgres:16-alpine
    env_file:
      - ./backend/.env
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-wellness_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.deployment
    env_file:
      - ./backend/.env
    environment:
      PORT: ${BACKEND_CONTAINER_PORT:-8000}
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      AUTO_START_SETUP: ${AUTO_START_SETUP:-false}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "${BACKEND_PORT:-8000}:${BACKEND_CONTAINER_PORT:-8000}"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.deployment
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api}
    env_file:
      - ./frontend/.env
      - ./.env
    environment:
      PORT: ${FRONTEND_CONTAINER_PORT:-4173}
    ports:
      - "${FRONTEND_PORT:-5173}:${FRONTEND_CONTAINER_PORT:-4173}"
    depends_on:
      - backend

volumes:
  postgres_data:
